<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KI-Liegestütz-Zähler</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --gray: #6b7280;
      --gray-dark: #4b5563;
      --green: #10b981;
      --green-dark: #059669;
      --yellow: #f59e0b;
      --shadow: 0 6px 16px rgba(0,0,0,.06);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .container { width: 100%; max-width: 950px; }

    .title {
      text-align: center;
      font-weight: 800;
      font-size: 1.8rem;
      color: #111;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .loader-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      gap: 10px;
    }
    .loader {
      width: 36px; height: 36px; border-radius: 50%;
      border: 5px solid #e5e7eb; border-top-color: var(--green);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #1f2937;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    #webcam { width: 100%; height: 100%; object-fit: cover; }
    #canvas  { position: absolute; inset: 0; width: 100%; height: 100%; }

    .panel {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .panel h2 {
      font-size: 1.1rem; font-weight: 700; color: var(--gray-dark);
      margin-bottom: 10px; text-align: center;
    }
    .stat { margin-bottom: 10px; text-align: center; }
    .label { font-size: 0.85rem; color: var(--muted); }
    .value { font-size: 2.5rem; font-weight: 800; color: var(--green); } /* Zähler grün */
    .value-stage { font-size: 1.4rem; color: var(--yellow); font-weight: 700; text-transform: uppercase; }
    .feedback { min-height: 24px; font-size: 0.9rem; color: var(--gray-dark); font-weight: 600; text-align: center; margin-top: 6px; }

    .btn {
      width: 100%; border: none; border-radius: 8px; padding: 8px;
      font-weight: 700; cursor: pointer; font-size: 0.9rem;
      background: var(--gray); color: white;
      transition: background .15s ease, transform .1s ease;
      margin-top: 8px;
    }
    .btn:hover { background: var(--gray-dark); }
    .btn:active { transform: translateY(1px); }
    .btn--green { background: var(--green); }
    .btn--green:hover { background: var(--green-dark); }

    .debug { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 6px; }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="title">KI-Liegestütz-Zähler</h1>
    <p class="subtitle">Geh in die Liegestütz-Position vor die Kamera.</p>

    <div class="card">
      <!-- Loading -->
      <div id="loading" class="loader-wrap">
        <div class="loader"></div>
        <div>
          <div id="loading-message"><strong>KI-Modell wird geladen…</strong></div>
          <div class="debug" id="loading-backend-info"></div>
        </div>
      </div>

      <!-- Main -->
      <div id="main-content" style="display:none;">
        <div class="layout">
          <!-- Camera & Canvas -->
          <div class="stage" id="canvas-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
          </div>

          <!-- Status -->
          <div class="panel">
            <h2>Status</h2>

            <div class="stat">
              <p class="label">Anzahl</p>
              <p id="count" class="value">0</p>
            </div>

            <div class="stat">
              <p class="label">Phase</p>
              <p id="stage" class="value-stage">-</p>
            </div>

            <div class="stat">
              <p class="label">Hinweis</p>
              <p id="feedback" class="feedback">Kamera wird vorbereitet...</p>
            </div>

            <button id="reset-button" class="btn">Zurücksetzen</button>
            <button id="finish-button" class="btn btn--green">Fertig</button>

            <p id="backend-info" class="debug"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TFJS & Pose Detection – pinned .min.js, removed cpu backend (not needed with webgl) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
  <script src="/celebration.js"></script>

  <script>
    // DOM
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const countEl = document.getElementById('count');
    const stageEl = document.getElementById('stage');
    const feedbackEl = document.getElementById('feedback');
    const loadingEl = document.getElementById('loading');
    const loadingMessageEl = document.getElementById('loading-message');
    const mainContentEl = document.getElementById('main-content');
    const resetButton = document.getElementById('reset-button');
    const finishButton = document.getElementById('finish-button');
    const canvasContainer = document.getElementById('canvas-container');
    const backendInfo = document.getElementById('backend-info');

    let detector;
    let counter = 0;
    let stage = 'up';
    const KEYPOINT_CONFIDENCE = 0.35;
    const SHOULDER_VISIBILITY = 0.3;
    const ARM_VISIBILITY = 0.3;
    const UP_ANGLE_THRESHOLD = 145;
    const DOWN_ANGLE_THRESHOLD = 110;

    function calculateAngle(a, b, c) {
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    async function setupCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('Kamera wird von diesem Browser nicht unterstützt.');
      }
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      video.srcObject = stream;
      return new Promise(resolve => video.onloadedmetadata = () => resolve(video));
    }

    async function initBackend() {
      try {
        await tf.setBackend('webgl');
        await tf.ready();
      } catch (e1) {
        console.warn('WebGL backend failed:', e1);
        await tf.setBackend('cpu');
        await tf.ready();
      }
      backendInfo.textContent = 'TFJS-Backend: ' + tf.getBackend();
      console.log('TFJS-Backend:', tf.getBackend());
    }

    async function loadModel() {
      const model = poseDetection.SupportedModels.MoveNet;
      const detectorConfig = { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING };
      detector = await poseDetection.createDetector(model, detectorConfig);
    }

    async function detectPose() {
      if (detector && video.readyState === 4) {
        let poses = [];
        try {
          poses = await detector.estimatePoses(video);
        } catch (error) {
          console.error(error);
          feedbackEl.textContent = 'Modellfehler: ' + error.message;
          feedbackEl.style.color = 'crimson';
          requestAnimationFrame(detectPose);
          return;
        }

        drawCanvas();
        if (poses.length > 0) {
          processPushup(poses[0]);
          drawKeypoints(poses[0]);
          drawSkeleton(poses[0]);
        }
      }
      requestAnimationFrame(detectPose);
    }

    function drawCanvas() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    }

    function drawKeypoints(pose) {
      for (const k of pose.keypoints) {
        if (k.score > KEYPOINT_CONFIDENCE) {
          ctx.beginPath();
          ctx.arc(k.x, k.y, 4, 0, 2 * Math.PI);
          ctx.fillStyle = '#6b7280';
          ctx.fill();
        }
      }
    }

    function drawSkeleton(pose) {
      const adjacent = poseDetection.util.getAdjacentPairs(poseDetection.SupportedModels.MoveNet);
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#6b7280';
      adjacent.forEach(([i, j]) => {
        const a = pose.keypoints[i], b = pose.keypoints[j];
        if (a.score > KEYPOINT_CONFIDENCE && b.score > KEYPOINT_CONFIDENCE) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      });
    }

    function processPushup(pose) {
      const kps = pose.keypoints;
      const get = (name) => kps.find(k => k.name === name);

      const ls = get('left_shoulder'), le = get('left_elbow'), lw = get('left_wrist');
      const rs = get('right_shoulder'), re = get('right_elbow'), rw = get('right_wrist');
      const lh = get('left_hip'), rh = get('right_hip');
      const nose = get('nose');

      // --- FRONTAL VIEW: both shoulders visible ---
      const bothShouldersVisible = (ls?.score > SHOULDER_VISIBILITY) && (rs?.score > SHOULDER_VISIBILITY);
      
      if (bothShouldersVisible) {
        // Frontal: use vertical movement of nose/shoulders relative to hips
        const leftArm = (le?.score > ARM_VISIBILITY && lw?.score > ARM_VISIBILITY) ? calculateAngle(ls, le, lw) : null;
        const rightArm = (re?.score > ARM_VISIBILITY && rw?.score > ARM_VISIBILITY) ? calculateAngle(rs, re, rw) : null;

        // Average both arm angles if available
        let angle = null;
        if (leftArm !== null && rightArm !== null) angle = (leftArm + rightArm) / 2;
        else if (leftArm !== null) angle = leftArm;
        else if (rightArm !== null) angle = rightArm;

        // Fallback: use shoulder-to-hip vertical ratio (body dips down)
        if (angle === null && nose?.score > SHOULDER_VISIBILITY && (lh?.score > SHOULDER_VISIBILITY || rh?.score > SHOULDER_VISIBILITY)) {
          const hipY = (lh?.score > SHOULDER_VISIBILITY && rh?.score > SHOULDER_VISIBILITY) ? (lh.y + rh.y) / 2 : (lh?.score > SHOULDER_VISIBILITY ? lh.y : rh.y);
          const shoulderY = (ls.y + rs.y) / 2;
          const ratio = (hipY - shoulderY) / Math.max(hipY, 1);
          // When down, shoulders are closer to hip level
          angle = ratio < 0.08 ? 70 : 170;
        }

        if (angle !== null) {
          evaluateAngle(angle);
        } else {
          feedbackEl.textContent = 'Halte deine Arme sichtbar!';
          feedbackEl.style.color = '#b45309';
        }
        return;
      }

      // --- SIDE VIEW: pick the more visible side ---
      let shoulder, elbow, wrist, hip;
      if ((ls?.score || 0) > (rs?.score || 0)) {
        shoulder = ls; elbow = le; wrist = lw; hip = lh;
      } else {
        shoulder = rs; elbow = re; wrist = rw; hip = rh;
      }

      if (shoulder?.score > ARM_VISIBILITY && elbow?.score > ARM_VISIBILITY && wrist?.score > ARM_VISIBILITY) {
        const angle = calculateAngle(shoulder, elbow, wrist);
        evaluateAngle(angle);
      } else {
        feedbackEl.textContent = 'Schulter, Ellbogen und Handgelenk müssen sichtbar sein.';
        feedbackEl.style.color = '#b45309';
      }
    }

    // Shared logic for counting reps based on elbow angle
    // Works for regular & knee push-ups (same arm movement)
    function evaluateAngle(angle) {
      if (angle > UP_ANGLE_THRESHOLD) {
        if (stage === 'down') {
          counter++;
          feedbackEl.textContent = 'Sehr gut! 💪';
          feedbackEl.style.color = '#059669';
        }
        stage = 'up';
      } else if (angle < DOWN_ANGLE_THRESHOLD) {
        if (stage === 'up') {
          feedbackEl.textContent = 'Weiter runter!';
          feedbackEl.style.color = '#374151';
        }
        stage = 'down';
      }
      countEl.textContent = counter;
      stageEl.textContent = stage;
    }

    // Buttons
    resetButton.addEventListener('click', () => {
      counter = 0;
      stage = 'up';
      countEl.textContent = counter;
      stageEl.textContent = '-';
      feedbackEl.textContent = 'Zurückgesetzt.';
      feedbackEl.style.color = '#374151';
    });

    finishButton.addEventListener('click', () => {
      if(counter === 0){
        localStorage.setItem("pushups_result", 0);
        window.location.href = "/challenge/daily";
        return;
      }
      createCelebration(counter, 'PUSH-UPS!', 'pushups_result', '/challenge/daily');
    });

    // Responsives Canvas (hält 4:3)
    function resizeCanvas() {
      const w = canvasContainer.clientWidth;
      const r = 4 / 3;
      canvasContainer.style.height = `${w / r}px`;
    }

    async function main() {
      try {
        loadingMessageEl.textContent = 'GPU wird initialisiert…';
        await initBackend();
        loadingMessageEl.textContent = 'Kamera wird gestartet…';
        await setupCamera();
        loadingMessageEl.textContent = 'KI-Modell wird geladen…';
        await loadModel();
      } catch (e) {
        loadingMessageEl.textContent = `Fehler: ${e.message}`;
        loadingMessageEl.style.color = 'red';
        console.error(e);
        return;
      }

      loadingEl.style.display = 'none';
      mainContentEl.style.display = 'block';
      feedbackEl.textContent = 'Bereit!';
      feedbackEl.style.color = '#059669';

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      detectPose();
    }

    main();
  </script>
</body>
</html>
