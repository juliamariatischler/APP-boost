<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KI Plank-Timer</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --gray: #6b7280;
      --gray-dark: #4b5563;
      --green: #10b981;
      --green-dark: #059669;
      --yellow: #f59e0b;
      --shadow: 0 6px 16px rgba(0,0,0,.06);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .container { width: 100%; max-width: 950px; }

    .title {
      text-align: center;
      font-weight: 800;
      font-size: 1.8rem;
      color: #111;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* Kamera + Canvas */
    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #1f2937;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Status Panel */
    .panel {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .panel h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gray-dark);
      margin-bottom: 10px;
      text-align: center;
    }

    .stat { margin-bottom: 10px; text-align: center; }
    .label { font-size: 0.85rem; color: var(--muted); }

    .value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--green); /* Zähler jetzt grün */
    }

    .value-stage {
      font-size: 1.4rem;
      color: var(--yellow);
      font-weight: 700;
    }

    .feedback {
      min-height: 24px;
      font-size: 0.9rem;
      color: var(--gray-dark);
      font-weight: 600;
      text-align: center;
      margin-top: 6px;
    }

    /* Buttons */
    .btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      background: var(--gray);
      color: white;
      transition: background 0.15s ease, transform 0.1s ease;
      margin-top: 8px;
    }

    .btn:hover { background: var(--gray-dark); }
    .btn:active { transform: translateY(1px); }

    .btn--green {
      background: var(--green);
    }
    .btn--green:hover { background: var(--green-dark); }

    /* Loader */
    .loader-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      gap: 10px;
    }

    .loader {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 5px solid #e5e7eb;
      border-top-color: var(--green);
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .debug {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    .reward-overlay{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(17,24,39,.55); z-index:80; padding:20px;
    }
    .reward-card{
      width:min(92vw,420px); background:#fff; border-radius:16px; padding:22px;
      text-align:center; box-shadow:0 18px 40px rgba(0,0,0,.28);
    }
    .reward-points{ font-size:2.2rem; font-weight:900; color:#f59e0b; }
    .reward-title{ font-size:1.2rem; font-weight:800; color:#111827; margin-bottom:6px; }
    .reward-text{ color:#4b5563; font-size:.95rem; }
    .fx-layer{ position:fixed; inset:0; pointer-events:none; z-index:90; }
    .bolt{
      position:absolute; width:14px; height:14px; border-radius:999px;
      background:linear-gradient(135deg,#fde047,#f59e0b);
      box-shadow:0 0 18px rgba(245,158,11,.55);
      animation:bolt-pop .9s ease-out forwards;
    }
    @keyframes bolt-pop{
      0%{ opacity:0; transform:translate(-50%,-50%) scale(.3); }
      20%{ opacity:1; }
      100%{ opacity:0; transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.1); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="title">KI Plank-Timer</h1>
    <p class="subtitle">Stell die Kamera seitlich auf und zeig dich im Profil.</p>

    <div class="card">
      <div id="loading" class="loader-wrap">
        <div class="loader"></div>
        <div>
          <div id="loading-message"><strong>Initialisiere Modell…</strong></div>
          <div class="debug" id="backend-info"></div>
        </div>
      </div>

      <div id="app" style="display:none;">
        <div class="layout">
          <!-- Video -->
          <div class="stage">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
          </div>

          <!-- Panel -->
          <div class="panel">
            <h2>Status</h2>

            <div class="stat">
              <p class="label">Zeit (Sek.)</p>
              <p id="timer" class="value">0</p>
            </div>

            <div class="stat">
              <p class="label">Haltung</p>
              <p id="stage" class="value-stage">-</p>
            </div>

            <div class="stat">
              <p class="label">Hinweis</p>
              <p id="feedback" class="feedback">Kamera: seitlich aufstellen.</p>
            </div>

            <button id="reset-button" class="btn">Zurücksetzen</button>
            <button id="finish-button" class="btn btn--green">Fertig</button>

            <div class="debug" id="debug-log"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="rewardOverlay" class="reward-overlay">
    <div class="reward-card">
      <p class="reward-title">Ziel erreicht!</p>
      <p id="rewardPoints" class="reward-points">+0 Blitze</p>
      <p id="rewardText" class="reward-text">Deine Blitze werden ins Konto gebucht.</p>
    </div>
  </div>
  <div id="fxLayer" class="fx-layer"></div>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-cpu"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

  <script>
    const video=document.getElementById('webcam');
    const canvas=document.getElementById('canvas');
    const ctx=canvas.getContext('2d');
    const timerEl=document.getElementById('timer');
    const stageEl=document.getElementById('stage');
    const feedbackEl=document.getElementById('feedback');
    const loadingWrap=document.getElementById('loading');
    const appWrap=document.getElementById('app');
    const loadingMsg=document.getElementById('loading-message');
    const backendInfo=document.getElementById('backend-info');
    const debugLog=document.getElementById('debug-log');
    const finishBtn=document.getElementById('finish-button');
    const rewardOverlay=document.getElementById('rewardOverlay');
    const rewardPoints=document.getElementById('rewardPoints');
    const rewardText=document.getElementById('rewardText');
    const fxLayer=document.getElementById('fxLayer');

    let detector,isPlanking=false,time=0,timerInterval=null;

    async function resolveApiBase(){
      const stored = localStorage.getItem('boost_api_base') || '';
      const candidates = [
        stored,
        `${window.location.origin}/api/v1`,
        'http://localhost:3000/api/v1',
        'http://127.0.0.1:3000/api/v1',
      ].filter(Boolean).map((x) => x.replace(/\/$/, ''));
      for(const base of [...new Set(candidates)]){
        try{
          const health = await fetch(`${base}/health`);
          if(health.ok){
            localStorage.setItem('boost_api_base', base);
            return base;
          }
        }catch(_err){
          // try next
        }
      }
      throw new Error('Kein API-Server erreichbar.');
    }

    function launchBoltFx(strength){
      const count = Math.max(10, Math.min(26, strength + 8));
      for(let i = 0; i < count; i += 1){
        const dot = document.createElement('span');
        dot.className = 'bolt';
        const x = 20 + Math.random() * 60;
        const y = 18 + Math.random() * 58;
        const angle = (Math.PI * 2 * i) / count;
        const radius = 70 + Math.random() * 180;
        dot.style.left = `${x}%`;
        dot.style.top = `${y}%`;
        dot.style.setProperty('--dx', `${Math.cos(angle) * radius}px`);
        dot.style.setProperty('--dy', `${Math.sin(angle) * radius}px`);
        dot.style.animationDelay = `${Math.floor(Math.random() * 160)}ms`;
        fxLayer.appendChild(dot);
        setTimeout(() => dot.remove(), 1000);
      }
    }

    function showReward(points, text){
      rewardPoints.textContent = `+${points} Blitze`;
      rewardText.textContent = text;
      rewardOverlay.style.display = 'flex';
      launchBoltFx(points);
    }

    async function submitWorkoutToAccount(exerciseId, achievedValue){
      const userId = localStorage.getItem('boost_user_id');
      const sessionToken = localStorage.getItem('boost_session_token');
      if(!userId || !sessionToken) throw new Error('Kein aktiver Login gefunden.');
      const apiBase = await resolveApiBase();
      const authHeaders = { 'Content-Type': 'application/json', 'x-user-id': userId, 'x-session-token': sessionToken };

      const startRes = await fetch(`${apiBase}/student/workout-sessions/start`, {
        method: 'POST',
        headers: authHeaders,
        body: JSON.stringify({ template_id: 'tpl_fitness_m1' }),
      });
      const startJson = await startRes.json().catch(() => ({}));
      if(!startRes.ok || !startJson.id) throw new Error(startJson.error || `HTTP ${startRes.status}`);

      const submitRes = await fetch(`${apiBase}/student/workout-sessions/${startJson.id}/submit`, {
        method: 'POST',
        headers: authHeaders,
        body: JSON.stringify({
          results: [
            {
              exercise_id: exerciseId,
              achieved_value: Math.max(0, Math.floor(achievedValue)),
              detection_confidence: 0.9,
              motion_score: 0.9,
            },
          ],
        }),
      });
      const submitJson = await submitRes.json().catch(() => ({}));
      if(!submitRes.ok) throw new Error(submitJson.error || `HTTP ${submitRes.status}`);
      return submitJson;
    }

    function angle(a,b,c){
      const r=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x);
      let d=Math.abs(r*180/Math.PI);
      if(d>180)d=360-d;
      return d;
    }

    async function initBackend(){
      try{await tf.setBackend('webgl');await tf.ready();}
      catch(e){await tf.setBackend('cpu');await tf.ready();}
      backendInfo.textContent='TFJS Backend: '+tf.getBackend();
    }

    function isLocalhostHost(hostname){
      return hostname==='localhost' || hostname==='127.0.0.1' || hostname==='[::1]';
    }

    async function setupCamera(){
      const constraints={video:{width:640,height:480,facingMode:'user'},audio:false};
      const secureOk=window.isSecureContext || isLocalhostHost(window.location.hostname);
      const modernGetUserMedia=navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
      const legacyGetUserMedia=navigator.webkitGetUserMedia;

      if(!secureOk){
        throw new Error('Kamera auf iPhone/Safari braucht HTTPS. Nutze https:// oder localhost.');
      }
      if(!modernGetUserMedia && !legacyGetUserMedia){
        throw new Error('Kamera-API in diesem Browser nicht verfügbar.');
      }

      const stream=modernGetUserMedia
        ? await navigator.mediaDevices.getUserMedia(constraints)
        : await new Promise((resolve,reject)=>{legacyGetUserMedia.call(navigator,constraints,resolve,reject);});

      video.srcObject=stream;
      return new Promise(res=>video.onloadedmetadata=()=>res());
    }

    async function loadModel(){
      const model=poseDetection.SupportedModels.MoveNet;
      const cfg={modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING};
      detector=await poseDetection.createDetector(model,cfg);
    }

    function mirrorX(x){ return canvas.width - x; }

    function drawSkeleton(pose){
      const pairs=poseDetection.util.getAdjacentPairs(poseDetection.SupportedModels.MoveNet);
      ctx.strokeStyle="#6b7280"; ctx.lineWidth=2;
      pairs.forEach(([a,b])=>{
        const k1=pose.keypoints[a],k2=pose.keypoints[b];
        if(k1.score>0.5&&k2.score>0.5){
          ctx.beginPath();ctx.moveTo(mirrorX(k1.x),k1.y);ctx.lineTo(mirrorX(k2.x),k2.y);ctx.stroke();
        }
      });
    }

    function drawKeypoints(pose){
      for(const kp of pose.keypoints){
        if(kp.score>0.5){
          ctx.beginPath();
          ctx.arc(mirrorX(kp.x),kp.y,4,0,2*Math.PI);
          ctx.fillStyle="#6b7280";
          ctx.fill();
        }
      }
    }

    function startTimer(){
      if(timerInterval)return;
      timerInterval=setInterval(()=>{time++;timerEl.textContent=time;},1000);
    }
    function stopTimer(){clearInterval(timerInterval);timerInterval=null;}

    function pickSide(kps,name){
      const l=kps.find(k=>k.name===`left_${name}`);
      const r=kps.find(k=>k.name===`right_${name}`);
      return ((l?.score||0)>=(r?.score||0))?l:r;
    }

    function processPlank(pose){
      const k=pose.keypoints;
      const shoulder=pickSide(k,'shoulder');
      const hip=pickSide(k,'hip');
      const knee=pickSide(k,'knee');
      if(!(shoulder?.score>0.5&&hip?.score>0.5&&knee?.score>0.5)){
        feedbackEl.textContent="Kamera sieht dich nicht gut.";
        stageEl.textContent="-";
        stopTimer();isPlanking=false;return;
      }
      const back=angle(shoulder,hip,knee);
      if(back>150){
        stageEl.textContent="HALTEN";
        feedbackEl.textContent="Halten!";
        if(!isPlanking){isPlanking=true;startTimer();}
      }else{
        stageEl.textContent="INSTABIL";
        feedbackEl.textContent="Hüfte stabil halten!";
        isPlanking=false;stopTimer();
      }
    }

    async function loop(){
      if(!detector||video.readyState!==4){requestAnimationFrame(loop);return;}
      canvas.width=video.videoWidth;canvas.height=video.videoHeight;
      try{
        const poses=await detector.estimatePoses(video);
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(poses.length>0){const pose=poses[0];
          drawSkeleton(pose);drawKeypoints(pose);processPlank(pose);}
      }catch(e){debugLog.textContent=e.message;}
      requestAnimationFrame(loop);
    }

    document.getElementById('reset-button').addEventListener('click',()=>{
      isPlanking=false;stopTimer();time=0;
      timerEl.textContent='0';stageEl.textContent='-';
      feedbackEl.textContent='Zurückgesetzt!';
    });

    finishBtn.addEventListener('click', async () => {
      finishBtn.disabled = true;
      finishBtn.textContent = 'Speichere...';
      localStorage.setItem('planks_total', String(time));
      try{
        const result = await submitWorkoutToAccount('ex_plank', time);
        const points = Number(result.calculated_points || 0);
        showReward(points, points > 0
          ? 'Stark! Die Blitze wurden auf dein Blitzekonto gebucht.'
          : 'Workout gespeichert. Heute wurden keine zusätzlichen Blitze gutgeschrieben.');
      }catch(err){
        showReward(0, `Konnte nicht buchen: ${err.message}`);
      }
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 1600);
    });

    async function main(){
      try{
        await initBackend();
        loadingMsg.textContent='Bitte Kamera erlauben…';
        await setupCamera();
        loadingMsg.textContent='Lade Modell…';
        await loadModel();
      }catch(e){
        loadingMsg.textContent='Fehler: '+e.message;
        loadingMsg.style.color='red';
        return;
      }
      loadingWrap.style.display='none';
      appWrap.style.display='block';
      feedbackEl.textContent='Bereit!';
      loop();
    }
    main();
  </script>
</body>
</html>
